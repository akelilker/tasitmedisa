<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TYS - Kullanıcı Raporları</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="TYS - Kullanıcı Raporları">
  <meta property="og:image" content="https://karmotors.com.tr/medisa/icon/medlogo.png">
  <meta property="og:image:width" content="516">
  <meta property="og:image:height" content="506">
  <meta property="og:url" content="https://karmotors.com.tr/medisa/admin/driver-report.html">
  <meta property="og:locale" content="tr_TR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://karmotors.com.tr/medisa/icon/medlogo.png">
<link rel="icon" type="image/png" href="../icon/medlogo.png?v=20260322-1">
<link rel="icon" type="image/x-icon" href="../icon/favicon.ico?v=20260322-1">
  <meta name="theme-color" content="#080d16">
  <meta name="msapplication-TileColor" content="#080d16">
  <link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="../icon/medlogo.png?v=20260322-1">
<link rel="apple-touch-icon" sizes="180x180" href="../icon/medlogo.png?v=20260322-1">
<link rel="apple-touch-icon" sizes="192x192" href="../icon/medlogo.png?v=20260322-1">
<link rel="apple-touch-icon" sizes="512x512" href="../icon/medlogo.png?v=20260322-1">
  <link rel="mask-icon" href="../icon/logo-header2.svg" color="#080d16">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kullanıcı Raporları - Medisa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style-core.css">
  <link rel="stylesheet" href="admin-report.css">
</head>
<body class="admin-report-page">
  <div id="pwa-install-wrapper" class="pwa-install-center"></div>
  <div class="admin-app-container">
    <div class="admin-content-wrap">
  <div class="hero admin-report-hero">
    <div class="hero-logo">
      <img src="../icon/logo-header2.svg" alt="MEDISA Logo">
    </div>
    <div class="hero-title-wrap admin-hero-title-wrap">
      <h1>TAŞIT YÖNETİM SİSTEMİ</h1>
      <p class="admin-report-subtitle">Kullanıcı Raporları</p>
      <div class="animated-line admin-hero-line"></div>
    </div>
    <div class="hero-spacer"></div>
  </div>

  <div class="driver-report-page">
    <div id="report-error" class="report-error" style="display:none; color:#c62828; margin-bottom:0.5rem;"></div>
    <div class="admin-tabs-container">
      <button type="button" class="admin-tab-btn active" data-admin-tab="aylik" onclick="switchAdminTab('aylik')">Aylık KM İzleme</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="kullanici" onclick="switchAdminTab('kullanici')">Kullanıcı Raporları</button>
    </div>

    <div id="tab-aylik" class="admin-tab-panel active" data-admin-panel="aylik">
    <div class="report-stats">
      <div class="report-stat-box">
        <div class="label">Toplam Kullanıcı</div>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="report-stat-box">
        <div class="label">Toplam Bildirim</div>
        <div class="value" id="stat-entered">0</div>
      </div>
      <div class="report-stat-box report-stat-box-pending">
        <div class="label">Bekleyen Bildirim</div>
        <div class="value" id="stat-pending">0</div>
      </div>
      <div class="report-stat-box">
        <div class="label">Tamamlanan</div>
        <div class="value" id="stat-percentage">0%</div>
      </div>
    </div>

    <div class="report-filters">
      <div class="report-filters-row">
        <label>
          Dönem:
          <select id="report-period"></select>
        </label>
        <label>
          Şube:
          <select id="report-branch">
            <option value="">Tüm Şubeler</option>
          </select>
        </label>
        <label>
          Durum:
          <select id="report-status">
            <option value="">Tümü</option>
            <option value="girdi">Bildirildi</option>
            <option value="girmedi">Bildirilmedi</option>
            <option value="kaza">Kaza</option>
            <option value="bakim">Bakım</option>
          </select>
        </label>
      </div>
    </div>

    <div class="report-filters-actions">
      <button type="button" id="report-refresh" class="report-icon-btn" title="Yenile" aria-label="Yenile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button type="button" id="report-export" class="report-icon-btn report-icon-excel" title="Excel İndir" aria-label="Excel İndir">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>
      </button>
    </div>

    <div class="report-table-wrap">
      <table class="report-table">
        <thead>
          <tr>
            <th>Kullanıcı</th>
            <th>Marka/ Model</th>
            <th>Plaka</th>
            <th>KM</th>
            <th>Durum</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="report-tbody"></tbody>
      </table>
    </div>

    <section class="pending-section">
      <h2 id="pending-section-title">Düzeltme Talepleri</h2>
      <div id="pending-requests-list" class="pending-list"></div>
    </section>
    </div>

    <div id="tab-kullanici" class="admin-tab-panel" data-admin-panel="kullanici" style="display: none;">
      <div class="user-analytics-toolbar">
        <input
          type="text"
          id="user-analytics-search"
          class="user-analytics-search-input"
          placeholder="İsim Soyisim Ara"
          autocomplete="off"
        >
        <div class="user-analytics-view-switch" role="group" aria-label="Görünüm Seçimi">
          <button type="button" id="user-analytics-view-list" class="user-analytics-view-btn active" data-view="list">Liste</button>
          <button type="button" id="user-analytics-view-card" class="user-analytics-view-btn" data-view="card">Kutu</button>
        </div>
      </div>
      <div id="user-analytics-container" class="user-analytics-wrap view-list">
        <p style="text-align:center; color: var(--muted); padding: 20px;">Kullanıcı verileri hesaplanıyor...</p>
      </div>
    </div>
  </div>
    </div>

    <footer id="app-footer" class="admin-footer">
      <div class="footer-content">
        <span id="version-display" class="version">Aylık Rapor</span>
        <span class="brand"><img src="../icon/logo-footer.svg" alt="MEDISA" style="height: 12.5px; width: auto;"></span>
        <span class="status status-ready">● Admin Panel</span>
      </div>
    </footer>
  </div>

  <script defer src="../script-core.js"></script>
  <script defer src="admin-report.js"></script>
</body>
</html>
