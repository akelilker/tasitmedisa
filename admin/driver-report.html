<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TYS - Kullanıcı Raporları</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="TYS - Kullanıcı Raporları">
  <meta property="og:image" content="https://karmotors.com.tr/medisa/icon/medlogo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:url" content="https://karmotors.com.tr/medisa/admin/driver-report.html">
  <meta property="og:locale" content="tr_TR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://karmotors.com.tr/medisa/icon/medlogo.png">
<link rel="icon" type="image/png" sizes="32x32" href="../icon/favicon-32.png?v=20260330-2">
<link rel="icon" type="image/png" href="../icon/medlogo.png?v=20260330-2">
<link rel="icon" type="image/x-icon" href="../icon/favicon.ico?v=20260330-2">
  <meta name="theme-color" content="#080d16">
  <meta name="msapplication-TileColor" content="#080d16">
  <link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="../icon/medlogo.png?v=20260330-2">
<link rel="apple-touch-icon" sizes="180x180" href="../icon/medlogo.png?v=20260330-2">
<link rel="apple-touch-icon" sizes="192x192" href="../icon/medlogo-192.png?v=20260330-2">
<link rel="apple-touch-icon" sizes="512x512" href="../icon/medlogo.png?v=20260330-2">
  <link rel="mask-icon" href="../icon/logo-header2.svg" color="#080d16">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kullanıcı Raporları - Medisa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style-core.css">
  <link rel="stylesheet" href="admin-report.css?v=20260506.10">
</head>
<body class="admin-report-page">
  <div id="pwa-install-wrapper" class="pwa-install-center"></div>
  <div class="admin-app-container">
    <div class="admin-content-wrap">
  <div class="hero hero-two-rows admin-report-hero">
    <div class="hero-logo admin-report-hero-side">
      <button type="button" id="admin-notifications-back-btn" class="admin-notifications-back-btn" aria-label="Ana sayfa bildirimlerine dön" hidden>
        <svg class="back-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"></path>
        </svg>
      </button>
      <picture>
        <source media="(max-width: 640px)" srcset="../icon/logo-header2-mobile-header.svg">
        <img src="../icon/logo-header2.svg" alt="MEDISA" class="logo-small">
      </picture>
      <span id="main-header-user-name" class="main-header-user-name is-empty" aria-live="polite"></span>
    </div>
    <div class="hero-title-block">
      <h1 class="hero-title-line">TAŞIT YÖNETİM SİSTEMİ</h1>
      <p class="hero-panel-subtitle">KULLANICI RAPORLARI</p>
    </div>
    <div class="hero-spacer admin-report-hero-side" aria-hidden="true"></div>
  </div>

  <div class="driver-report-page">
    <div id="report-error" class="report-error" style="display:none; color:#c62828; margin-bottom:0.5rem;"></div>
    <div class="admin-tabs-container">
      <button type="button" class="admin-tab-btn active" data-admin-tab="aylik" onclick="switchAdminTab('aylik')">Aylık KM İzleme</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="kullanici" onclick="switchAdminTab('kullanici')">Kullanıcı Raporları</button>
    </div>

    <div id="tab-aylik" class="admin-tab-panel active" data-admin-panel="aylik">
      <div class="monthly-report-shell">
        <div id="report-branch-grid" class="branch-grid monthly-branch-grid"></div>
        <div id="monthly-stage-empty" class="monthly-stage-empty"></div>

        <div id="monthly-stage-detail" class="monthly-stage-detail" hidden>
          <div id="report-selection-bar" class="report-selection-bar"></div>

          <div class="report-stats report-stats-enhanced">
            <div class="report-stat-box">
              <div class="label">Toplam Taşıt</div>
              <div class="value" id="stat-total">0</div>
            </div>
            <div class="report-stat-box">
              <div class="label">Tahsisli</div>
              <div class="value" id="stat-tracked">0</div>
            </div>
            <div class="report-stat-box">
              <div class="label">Bildiren</div>
              <div class="value" id="stat-entered">0</div>
            </div>
            <div class="report-stat-box report-stat-box-pending">
              <div class="label">Beklenen</div>
              <div class="value" id="stat-pending">0</div>
            </div>
            <div class="report-stat-box report-stat-box-muted">
              <div class="label">Tahsisi Olmayan</div>
              <div class="value" id="stat-unassigned">0</div>
            </div>
          </div>

          <div class="report-toolbar-shell">
            <div class="report-toolbar-row report-toolbar-compact">
              <div class="report-toolbar-period">
                <select id="report-period" aria-label="Dönem seçimi"></select>
              </div>

              <div class="report-toolbar-right">
                <div id="report-search-container" class="report-search-container">
                  <input type="text" id="report-search" class="report-search-input compact-search-input" placeholder="Plaka, Kullanıcı, Marka, Şube Ara" autocomplete="off">
                </div>

                <button type="button" id="report-search-toggle" class="report-icon-btn" title="Ara" aria-label="Ara">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                  </svg>
                </button>

                <button type="button" id="monthly-view-toggle" class="vt-icon-btn" title="Kutu görünümü" aria-label="Kutu görünümü">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                  </svg>
                </button>

                <div class="report-toolbar-actions">
                  <button type="button" id="report-export" class="report-icon-btn report-icon-excel" title="Excel İndir" aria-label="Excel İndir">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div id="report-status-pills" class="report-status-pills">
            <button type="button" class="report-status-pill active" data-status="">Tümü</button>
            <button type="button" class="report-status-pill" data-status="girdi">Bildirenler</button>
            <button type="button" class="report-status-pill" data-status="girmedi">Beklenenler</button>
            <button type="button" class="report-status-pill" data-status="atamasiz">Tahsisi Olmayan</button>
            <button type="button" class="report-status-pill" data-status="kaza">Kaza</button>
            <button type="button" class="report-status-pill" data-status="bakim">Bakım</button>
          </div>

          <div id="monthly-report-content" class="monthly-report-content"></div>
        </div>
      </div>

      <section class="pending-section">
        <h2 id="pending-section-title">Bekleyen Talepler</h2>
        <div id="pending-requests-list" class="pending-list"></div>
      </section>
    </div>

    <div id="tab-kullanici" class="admin-tab-panel" data-admin-panel="kullanici" style="display: none;">
      <div class="user-analytics-toolbar">
        <div class="user-analytics-toolbar-right">
          <div id="user-analytics-search-container" class="report-search-container user-search-container">
            <input
              type="text"
              id="user-analytics-search"
              class="user-analytics-search-input compact-search-input"
              placeholder="İsim, Telefon, E-posta, Plaka, Marka Ara"
              autocomplete="off"
            >
          </div>

          <button type="button" id="user-analytics-search-toggle" class="user-analytics-view-btn" title="Ara" aria-label="Ara">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>

          <button type="button" id="user-analytics-view-toggle" class="vt-icon-btn" title="Kutu görünümü" aria-label="Kutu görünümü">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
          </button>
        </div>
      </div>
      <div id="user-analytics-container" class="user-analytics-wrap view-list">
        <p style="text-align:center; color: var(--muted); padding: 20px;">Kullanıcı verileri hesaplanıyor...</p>
      </div>
    </div>
  </div>
    </div>

    <footer id="app-footer" class="admin-footer">
      <div class="footer-content">
        <span id="version-display" class="version">Aylık Rapor</span>
        <span class="brand"><img src="../icon/logo-footer.svg" alt="MEDISA" style="height: 12.5px; width: auto;"></span>
        <span class="status status-ready">● Admin Panel</span>
      </div>
    </footer>
  </div>

  <script defer src="../script-core.js"></script>
  <script defer src="admin-report.js?v=20260503.7"></script>
</body>
</html>
