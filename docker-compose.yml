services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tasitmedisa
    ports:
      - "8080:80"
    volumes:
      - app-data:/var/www/html/data
    environment:
      - MEDISA_SNAPSHOT_MAX=25
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  app-data:
    driver: local
