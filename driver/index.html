    <!-- Splash: ana uygulama ile aynı logo+başlık (kritik, mobilde kesin uygulansın) -->
    <style>
        .driver-splash-inner { min-width: 120px !important; flex-shrink: 0 !important; }
        .driver-splash-logo { width: 120px !important; height: 69px !important; flex-shrink: 0 !important; object-fit: contain !important; filter: brightness(0.88) !important; }
        .driver-splash-title { font-size: clamp(16px, 4.5vw, 24px) !important; font-weight: 800 !important; letter-spacing: clamp(1px, 0.5vw, 4px) !important; text-transform: uppercase !important; margin: 0 !important; flex-shrink: 0 !important; background: linear-gradient(to bottom, #c2d4df 0%, #ffffff 40%, #9aadba 52%, #d6e0e8 100%) !important; -webkit-background-clip: text !important; background-clip: text !important; -webkit-text-fill-color: transparent !important; font-family: 'Inter', sans-serif !important; }
    </style>
    <style>
      /* Şifre ekranı input: varsayılan gri; tıklanınca (focus) ve dolu iken (has-value) kırmızı */
      .login-form .form-group input,
      .login-form .form-group input[type="text"],
      .login-form .form-group input[type="password"] {
        background: #0f1418 !important;
        background-color: #0f1418 !important;
        border: none !important;
        box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.35) !important;
      }
      .login-form .form-group input:focus,
      .login-page .login-form .form-group input:focus {
        box-shadow: inset 0 0 0 0.5px #d40000 !important;
      }
      .login-form .form-group input.has-value,
      .login-page .login-form .form-group input.has-value {
        box-shadow: inset 0 0 0 0.5px #d40000 !important;
      }
      .login-form .form-group input:-webkit-autofill,
      .login-form .form-group input:-webkit-autofill:hover,
      .login-form .form-group input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 30px #0f1418 inset, inset 0 0 0 0.5px rgba(255, 255, 255, 0.35) !important;
        box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.35) !important;
        -webkit-text-fill-color: #f0f0f0 !important;
        background: #0f1418 !important;
        background-color: #0f1418 !important;
        border: none !important;
        transition: background-color 5000s ease-in-out 0s;
      }
    </style>
</head>
<body class="login-page">
    <div id="driver-splash" class="driver-splash" aria-hidden="false">
        <div class="driver-splash-inner">
            <img src="../icon/logo-header2.svg" alt="MEDISA" class="driver-splash-logo" width="120" height="69">
            <h1 class="driver-splash-title">TAŞIT YÖNETİM SİSTEMİ</h1>
        </div>
    </div>
    <div class="app-container driver-dashboard-container">
        <div class="driver-header-fixed">
            <div class="hero">
                <div class="hero-logo">
                    <picture>
                        <source media="(max-width: 640px)" srcset="../icon/logo-header2-mobile-header.svg">
                        <img src="../icon/logo-header2.svg" alt="MEDISA Logo">
                    </picture>
                </div>
                <h1>TAŞIT YÖNETİM SİSTEMİ</h1>
                <div class="hero-spacer"></div>
                <div class="animated-line"></div>
            </div>
        </div>
        <div id="pwa-install-wrapper" class="pwa-install-center"></div>
        <main class="content-wrap driver-content-wrap driver-scroll-area">
            <div class="login-container">
                <form id="login-form" class="login-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="username">Kullanıcı Adı</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            placeholder="Örn: Savaş" 
                            required 
                            autocomplete="username">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Şifre</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="••••••" 
                            required
                            autocomplete="current-password">
                    </div>
                    
                    <div class="form-group-checkbox">
                        <input type="checkbox" id="remember" name="remember" checked>
                        <label for="remember">Kullanıcı adı ve şifreyi bu cihazda hatırla (portal oturumu ayrıca cihazda tutulur)</label>
                    </div>
                    
                    <div id="error-message" class="error-message"></div>
                    
                    <button type="submit" class="btn-login" id="login-btn">
                        <span class="btn-text">Giriş Yap</span>
                        <span class="btn-loader" style="display: none;">⏳</span>
                    </button>
                </form>
            </div>
        </main>
        <footer id="app-footer" class="login-footer">
            <div class="footer-content">
                <span class="version" id="version-display">v78.1</span>
                <span class="brand"><img src="../icon/logo-footer.svg" alt="MEDISA" style="height: 12.5px; width: auto;"></span>
                <span class="status status-ready">● Sistem Hazır</span>
            </div>
        </footer>
    </div>
<script defer src="driver-script.js?v=20260406.2"></script>
</body>
</html>
