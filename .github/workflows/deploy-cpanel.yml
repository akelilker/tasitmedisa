# cPanel'e FTP ile yükleme (main push veya elle tetikleme).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD  — çoğu cPanel hesabında zaten tanımlı
#   FTP_REMOTE_DIR  — sunucudaki hedef klasör, FTP köküne göre, sonda / olmalı
#                     örn. public_html/medisa/  (.cpanel.yml DEPLOYPATH ile uyumlu olsun)
#                     Aynı isimle "Repository variables" altında da verilebilir (secret boşsa orası kullanılır).
#
# İsteğe bağlı: Farklı bağlantı tipi gerekiyorsa Actions → Variables altında değiştirin:
#   FTP_PROTOCOL  — varsayılan ftps  (ftp | ftps | ftps-legacy)
#   FTP_PORT      — varsayılan 21
#   FTP_SECURITY  — varsayılan loose (strict | loose)
# Canlı data.json: exclude ile gönderilmiyor; sunucudaki dosya korunur.
#
# Sunucu klasörü güncellenmiyorsa (GitHub'da commit var, FTP'de eski dosya):
# - Repo → Actions → "Deploy cPanel": son koşu var mı, yeşil mi? verbose log'da gerçekten upload var mı?
# - Sadece git push kullanıyorsanız: cPanel "Git Version Control" ile otomatik çekim yoksa
#   sunucu değişmez; ya bu workflow'u (secrets + yeşil koşu) kullanın ya da panelden Pull/Deploy.
# - Doğru hedef: FTP_REMOTE_DIR, FileZilla ile bağlandığınızda sitenin dosyalarının olduğu klasör olmalı;
#   çoğu hesapta public_html/medisa/ veya yalnızca medisa/ (FTP kökü zaten public_html ise).
# - Bazı hostlar yalnızca FTPS kabul eder: protocol: ftps ve paneldeki port (genelde 21 explicit).
# - Yeşil ama "0 file uploaded": önce yanlış server-dir mi bakın; gerekirse sunucudaki .ftp-deploy-sync-state.json
#   yedekleyip silerek bir kez tam senkron deneyin (risk: exclude dışı silme davranışını bilerek yapın).

name: Deploy cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp:
    name: FTP to cPanel
    runs-on: ubuntu-latest
    # SamKirkland/FTP-Deploy-Action henüz node24 bildirmedi; GitHub Node 20 uyarısını kaldırmak için:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR || vars.FTP_REMOTE_DIR }}
      FTP_PROTOCOL: ${{ vars.FTP_PROTOCOL || 'ftps' }}
      FTP_PORT: ${{ vars.FTP_PORT || '21' }}
      FTP_SECURITY: ${{ vars.FTP_SECURITY || 'loose' }}
    steps:
      - uses: actions/checkout@v6

      - name: Secrets kontrolü (boşsa FTP sunucu köküne yazar; canlıda değişiklik görünmez)
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          ok=1
          for n in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_REMOTE_DIR; do
            v="${!n}"
            if [ -z "${v:-}" ]; then
              if [ "$n" = "FTP_REMOTE_DIR" ]; then
                echo "::error::$n boş. Actions → Secrets veya Variables'ta FTP_REMOTE_DIR ekleyin (sonda / zorunlu)."
              else
                echo "::error::$n tanımlı değil veya boş. Settings → Secrets and variables → Actions → Secrets."
              fi
              ok=0
            fi
          done
          # Sonda / yoksa SamKirkland eylem beklenmeyen yol üretebilir
          if [ "${FTP_REMOTE_DIR%/}" = "$FTP_REMOTE_DIR" ]; then
            echo "::error::FTP_REMOTE_DIR sonda / ile bitmeli (örn. public_html/medisa/ veya medisa/)."
            ok=0
          fi
          case "$FTP_PROTOCOL" in
            ftp|ftps|ftps-legacy) ;;
            *)
              echo "::error::FTP_PROTOCOL geçersiz. İzin verilen değerler: ftp, ftps, ftps-legacy."
              ok=0
              ;;
          esac
          case "$FTP_PORT" in
            ''|*[!0-9]*)
              echo "::error::FTP_PORT sayısal olmalı."
              ok=0
              ;;
          esac
          [ "$ok" -eq 1 ] || exit 1
          echo "FTP_REMOTE_DIR uzunluk: ${#FTP_REMOTE_DIR} (host köküne göre doğru klasör olduğundan emin olun)"
          echo "FTP bağlantı modu: protocol=$FTP_PROTOCOL port=$FTP_PORT security=$FTP_SECURITY"

      - name: Deploy öncesi — commit ve kritik dosyalar (logda doğrulayın)
        run: |
          git log -1 --oneline
          ls -la ayarlar.js script-core.js index.html

      - name: Sync via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_REMOTE_DIR }}
          local-dir: ./
          log-level: verbose
          protocol: ${{ env.FTP_PROTOCOL }}
          port: ${{ env.FTP_PORT }}
          security: ${{ env.FTP_SECURITY }}
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            data/data.json
            tys.zip
