# cPanel'e FTP ile yükleme (main push veya elle tetikleme).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD  — çoğu cPanel hesabında zaten tanımlı
#   FTP_REMOTE_DIR  — sunucudaki hedef klasör, FTP köküne göre, sonda / olmalı
#                     örn. public_html/medisa/  (.cpanel.yml DEPLOYPATH ile uyumlu olsun)
#
# İsteğe bağlı: FTPS / özel port kullanıyorsanız aşağıdaki satırlardaki protocol ve port'u düzenleyin.
# Canlı data.json: exclude ile gönderilmiyor; sunucudaki dosya korunur.

name: Deploy cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp:
    name: FTP to cPanel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6

        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          local-dir: ./

          protocol: ftps
          port: 21
          security: loose

          timeout: 600000
          dangerous-clean-slate: false

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            data/data.json
            tys.zip