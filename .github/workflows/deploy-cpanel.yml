# cPanel'e SSH ile rsync (main push veya elle tetikleme).
# Gerekli GitHub Secrets (Repo → Settings → Secrets and variables → Actions):
#   CPANEL_SSH_HOST      örn. sunucu.example.com veya IP
#   CPANEL_SSH_USER      SSH kullanıcı adı (genelde cPanel kullanıcısı)
#   CPANEL_SSH_KEY       sunucuya erişen private key (PEM, tam içerik)
#   CPANEL_DEPLOY_PATH   örn. /home/KULLANICI/public_html/medisa  (sonunda / olmasın)
#
# .cpanel.yml ile aynı hedefe gider; canlı data.json'u ezmemek için data/data.json hariç.

name: Deploy cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rsync:
    name: Rsync to cPanel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files over SSH
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --exclude=.git/ --exclude=.github/ --exclude=data/data.json --exclude=tys.zip
          path: ./
          remote_path: ${{ secrets.CPANEL_DEPLOY_PATH }}/
          remote_host: ${{ secrets.CPANEL_SSH_HOST }}
          remote_user: ${{ secrets.CPANEL_SSH_USER }}
          remote_key: ${{ secrets.CPANEL_SSH_KEY }}
