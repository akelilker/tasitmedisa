# cPanel'e FTP ile yükleme (main push veya elle tetikleme).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD  — çoğu cPanel hesabında zaten tanımlı
#   FTP_REMOTE_DIR  — sunucudaki hedef klasör, FTP köküne göre, sonda / olmalı
#                     örn. public_html/medisa/  (.cpanel.yml DEPLOYPATH ile uyumlu olsun)
#                     Aynı isimle "Repository variables" altında da verilebilir (secret boşsa orası kullanılır).
#
# İsteğe bağlı: Farklı bağlantı tipi gerekiyorsa Actions → Variables altında değiştirin:
#   FTP_PROTOCOL  — varsayılan ftps  (ftp | ftps | ftps-legacy)
#   FTP_PORT      — varsayılan 21
#   FTP_SECURITY  — varsayılan loose (strict | loose)
# Canlı data.json: exclude ile gönderilmiyor; sunucudaki dosya korunur.
#
# Sunucu klasörü güncellenmiyorsa (GitHub'da commit var, FTP'de eski dosya):
# - Repo → Actions → "Deploy cPanel": son koşu var mı, yeşil mi? verbose log'da gerçekten upload var mı?
# - Sadece git push kullanıyorsanız: cPanel "Git Version Control" ile otomatik çekim yoksa
#   sunucu değişmez; ya bu workflow'u (secrets + yeşil koşu) kullanın ya da panelden Pull/Deploy.
# - Doğru hedef: FTP_REMOTE_DIR, FileZilla ile bağlandığınızda sitenin dosyalarının olduğu klasör olmalı;
#   çoğu hesapta public_html/medisa/ veya yalnızca medisa/ (FTP kökü zaten public_html ise).
# - Bazı hostlar yalnızca FTPS kabul eder: protocol: ftps ve paneldeki port (genelde 21 explicit).
# - Yeşil ama "0 file uploaded": önce yanlış server-dir mi bakın; gerekirse sunucudaki .ftp-deploy-sync-state.json
#   yedekleyip silerek bir kez tam senkron deneyin (risk: exclude dışı silme davranışını bilerek yapın).
#
# FTP retry: her deneme ayrı job + ayrı GitHub-hosted runner (geçici ağ/IP sorunlarında aynı runner tekrarından kaçınır).

name: Deploy cPanel

# Paylaşımlı hosting: aynı anda iki FTP oturumu limit / FIN üretebilir; tek sıra kuyruk.
concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR || vars.FTP_REMOTE_DIR }}
  FTP_PROTOCOL: ${{ vars.FTP_PROTOCOL || 'ftps' }}
  FTP_PORT: ${{ vars.FTP_PORT || '21' }}
  FTP_SECURITY: ${{ vars.FTP_SECURITY || 'loose' }}

jobs:
  deploy_preflight:
    name: Deploy preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Secrets kontrolü (boşsa FTP sunucu köküne yazar; canlıda değişiklik görünmez)
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          ok=1
          for n in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_REMOTE_DIR; do
            v="${!n}"
            if [ -z "${v:-}" ]; then
              if [ "$n" = "FTP_REMOTE_DIR" ]; then
                echo "::error::$n boş. Actions → Secrets veya Variables'ta FTP_REMOTE_DIR ekleyin (sonda / zorunlu)."
              else
                echo "::error::$n tanımlı değil veya boş. Settings → Secrets and variables → Actions → Secrets."
              fi
              ok=0
            fi
          done
          # Sonda / yoksa SamKirkland eylem beklenmeyen yol üretebilir
          if [ "${FTP_REMOTE_DIR%/}" = "$FTP_REMOTE_DIR" ]; then
            echo "::error::FTP_REMOTE_DIR sonda / ile bitmeli (örn. public_html/medisa/ veya medisa/)."
            ok=0
          fi
          case "$FTP_PROTOCOL" in
            ftp|ftps|ftps-legacy) ;;
            *)
              echo "::error::FTP_PROTOCOL geçersiz. İzin verilen değerler: ftp, ftps, ftps-legacy."
              ok=0
              ;;
          esac
          case "$FTP_PORT" in
            ''|*[!0-9]*)
              echo "::error::FTP_PORT sayısal olmalı."
              ok=0
              ;;
          esac
          case "$FTP_SECURITY" in
            strict|loose) ;;
            *)
              echo "::error::FTP_SECURITY geçersiz. İzin verilen değerler: strict, loose."
              ok=0
              ;;
          esac
          [ "$ok" -eq 1 ] || exit 1
          echo "FTP_REMOTE_DIR uzunluk: ${#FTP_REMOTE_DIR} (host köküne göre doğru klasör olduğundan emin olun)"
          echo "FTP bağlantı modu: protocol=$FTP_PROTOCOL port=$FTP_PORT security=$FTP_SECURITY"

      - name: Deploy öncesi — commit ve kritik dosyalar (logda doğrulayın)
        run: |
          echo "github.sha=${{ github.sha }}"
          head_sha="$(git rev-parse HEAD)"
          echo "git rev-parse HEAD=${head_sha}"
          if [ "$head_sha" != "${{ github.sha }}" ]; then
            echo "::error::github.sha ile HEAD eşleşmiyor"
            exit 1
          fi
          git log -1 --oneline
          ls -la ayarlar.js script-core.js index.html

  ftp_attempt_1:
    name: FTP deploy attempt 1
    needs: deploy_preflight
    runs-on: ubuntu-latest
    outputs:
      succeeded: ${{ steps.attempt_result.outputs.succeeded }}
    steps:
      - uses: actions/checkout@v6

      - name: Network diagnostics before FTP attempt 1
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set +e
          echo "Runner public IPv4:"
          curl -4 --fail --silent --show-error --connect-timeout 8 --max-time 12 https://api.ipify.org || \
            curl -4 --fail --silent --show-error --connect-timeout 8 --max-time 12 https://checkip.amazonaws.com || \
            echo "public IPv4 lookup failed"
          echo
          echo "FTP control port probe: ${FTP_SERVER}:${FTP_PORT}"
          if timeout 15 bash -c 'cat < /dev/null > /dev/tcp/${FTP_SERVER}/${FTP_PORT}'; then
            echo "FTP control port reachable."
          else
            echo "::warning::FTP control port probe failed or timed out before deploy attempt 1."
          fi
          echo "HTTPS port probe: karmotors.com.tr:443"
          if timeout 15 bash -c 'cat < /dev/null > /dev/tcp/karmotors.com.tr/443'; then
            echo "HTTPS port reachable."
          else
            echo "::warning::HTTPS port probe failed or timed out before deploy attempt 1."
          fi

      - name: Sync via FTP
        id: ftp_deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_REMOTE_DIR }}
          local-dir: ./
          log-level: verbose
          protocol: ${{ env.FTP_PROTOCOL }}
          port: ${{ env.FTP_PORT }}
          security: ${{ env.FTP_SECURITY }}
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/.agents/**
            **/.vscode/**
            **/outputs/**
            **/tmp/**
            docs/**
            scripts/**
            _ux-test-output/**
            assets/**
            .cpanel.yml
            .cursorignore
            .editorconfig
            AGENTS.md
            DEPLOYMENT.md
            README.md
            package.json
            **/*.zip
            data/**

      - name: Record attempt result
        id: attempt_result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.ftp_deploy.outcome }}" = "success" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            echo "FTP deploy succeeded on attempt 1"
          else
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP attempt 1 failed. A fresh runner will be used for attempt 2."
          fi

  ftp_attempt_2:
    name: FTP deploy attempt 2
    needs:
      - deploy_preflight
      - ftp_attempt_1
    if: >-
      ${{
        !cancelled() &&
        needs.deploy_preflight.result == 'success' &&
        needs.ftp_attempt_1.outputs.succeeded != 'true'
      }}
    runs-on: ubuntu-latest
    outputs:
      succeeded: ${{ steps.attempt_result.outputs.succeeded }}
    steps:
      - uses: actions/checkout@v6

      - name: Retry backoff
        run: sleep 45

      - name: Network diagnostics before FTP attempt 2
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set +e
          echo "Runner public IPv4:"
          curl -4 --fail --silent --show-error --connect-timeout 8 --max-time 12 https://api.ipify.org || \
            curl -4 --fail --silent --show-error --connect-timeout 8 --max-time 12 https://checkip.amazonaws.com || \
            echo "public IPv4 lookup failed"
          echo
          echo "FTP control port probe: ${FTP_SERVER}:${FTP_PORT}"
          if timeout 15 bash -c 'cat < /dev/null > /dev/tcp/${FTP_SERVER}/${FTP_PORT}'; then
            echo "FTP control port reachable."
          else
            echo "::warning::FTP control port probe failed or timed out before deploy attempt 2."
          fi
          echo "HTTPS port probe: karmotors.com.tr:443"
          if timeout 15 bash -c 'cat < /dev/null > /dev/tcp/karmotors.com.tr/443'; then
            echo "HTTPS port reachable."
          else
            echo "::warning::HTTPS port probe failed or timed out before deploy attempt 2."
          fi

      - name: Sync via FTP
        id: ftp_deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_REMOTE_DIR }}
          local-dir: ./
          log-level: verbose
          protocol: ${{ env.FTP_PROTOCOL }}
          port: ${{ env.FTP_PORT }}
          security: ${{ env.FTP_SECURITY }}
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/.agents/**
            **/.vscode/**
            **/outputs/**
            **/tmp/**
            docs/**
            scripts/**
            _ux-test-output/**
            assets/**
            .cpanel.yml
            .cursorignore
            .editorconfig
            AGENTS.md
            DEPLOYMENT.md
            README.md
            package.json
            **/*.zip
            data/**

      - name: Record attempt result
        id: attempt_result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.ftp_deploy.outcome }}" = "success" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            echo "FTP deploy succeeded on attempt 2"
          else
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP attempt 2 failed. A fresh runner will be used for attempt 3."
          fi

  ftp_attempt_3:
    name: FTP deploy attempt 3
    needs:
      - deploy_preflight
      - ftp_attempt_1
      - ftp_attempt_2
    if: >-
      ${{
        !cancelled() &&
        needs.deploy_preflight.result == 'success' &&
        needs.ftp_attempt_1.outputs.succeeded != 'true' &&
        needs.ftp_attempt_2.outputs.succeeded != 'true'
      }}
    runs-on: ubuntu-latest
    outputs:
      succeeded: ${{ steps.attempt_result.outputs.succeeded }}
    steps:
      - uses: actions/checkout@v6

      - name: Retry backoff
        run: sleep 120

      - name: Network diagnostics before FTP attempt 3
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set +e
          echo "Runner public IPv4:"
          curl -4 --fail --silent --show-error --connect-timeout 8 --max-time 12 https://api.ipify.org || \
            curl -4 --fail --silent --show-error --connect-timeout 8 --max-time 12 https://checkip.amazonaws.com || \
            echo "public IPv4 lookup failed"
          echo
          echo "FTP control port probe: ${FTP_SERVER}:${FTP_PORT}"
          if timeout 15 bash -c 'cat < /dev/null > /dev/tcp/${FTP_SERVER}/${FTP_PORT}'; then
            echo "FTP control port reachable."
          else
            echo "::warning::FTP control port probe failed or timed out before deploy attempt 3."
          fi
          echo "HTTPS port probe: karmotors.com.tr:443"
          if timeout 15 bash -c 'cat < /dev/null > /dev/tcp/karmotors.com.tr/443'; then
            echo "HTTPS port reachable."
          else
            echo "::warning::HTTPS port probe failed or timed out before deploy attempt 3."
          fi

      - name: Sync via FTP
        id: ftp_deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_REMOTE_DIR }}
          local-dir: ./
          log-level: verbose
          protocol: ${{ env.FTP_PROTOCOL }}
          port: ${{ env.FTP_PORT }}
          security: ${{ env.FTP_SECURITY }}
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/.agents/**
            **/.vscode/**
            **/outputs/**
            **/tmp/**
            docs/**
            scripts/**
            _ux-test-output/**
            assets/**
            .cpanel.yml
            .cursorignore
            .editorconfig
            AGENTS.md
            DEPLOYMENT.md
            README.md
            package.json
            **/*.zip
            data/**

      - name: Record attempt result
        id: attempt_result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.ftp_deploy.outcome }}" = "success" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            echo "FTP deploy succeeded on attempt 3"
          else
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP attempt 3 failed."
          fi

  deploy_result:
    name: Final deploy result
    needs:
      - deploy_preflight
      - ftp_attempt_1
      - ftp_attempt_2
      - ftp_attempt_3
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate FTP deploy result
        id: evaluate
        shell: bash
        run: |
          if [ "${{ needs.deploy_preflight.result }}" != "success" ]; then
            echo "::error::Deploy preflight failed."
            exit 1
          fi

          a1="${{ needs.ftp_attempt_1.outputs.succeeded }}"
          a2="${{ needs.ftp_attempt_2.outputs.succeeded }}"
          a3="${{ needs.ftp_attempt_3.outputs.succeeded }}"

          if [ "$a1" = "true" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            echo "successful_attempt=1" >> "$GITHUB_OUTPUT"
            echo "FTP deploy succeeded on attempt 1"
            exit 0
          fi

          if [ "$a2" = "true" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            echo "successful_attempt=2" >> "$GITHUB_OUTPUT"
            echo "FTP deploy succeeded on attempt 2"
            exit 0
          fi

          if [ "$a3" = "true" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            echo "successful_attempt=3" >> "$GITHUB_OUTPUT"
            echo "FTP deploy succeeded on attempt 3"
            exit 0
          fi

          echo "succeeded=false" >> "$GITHUB_OUTPUT"
          echo "::error::FTP server control socket was unreachable from three separate GitHub-hosted runners."
          echo "::error::FTP deploy failed after 3 fresh-runner attempts."
          exit 1

      - name: HTTP verification — canlı site erişilebilir mi
        if: steps.evaluate.outputs.succeeded == 'true'
        run: |
          if curl --fail --silent --show-error --location \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --output /dev/null \
            https://karmotors.com.tr/medisa/; then
            echo "HTTP verification succeeded."
          else
            echo "::warning::FTP deploy succeeded, but post-deploy HTTPS verification could not reach the live site from the GitHub-hosted runner."
          fi